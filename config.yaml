random_state: 42

data:
  raw_path: "data/raw/paysim_transactions.csv"
  processed_dir: "data/processed"

model_output:
  dir: "models"

cv:
  # Expanding-window time-based folds over `step` (see src/cv.py). A single
  # 80/20 split (old time_cutoff_quantile: 0.8) left only ~4,250 fraud rows
  # in the test window -- noisy enough to swing PR-AUC on its own. These
  # boundaries produce 3 folds; the last fold's test window (step above the
  # 0.8 quantile) matches the old single-split holdout exactly.
  fold_boundaries: [0.4, 0.6, 0.8, 1.0]

sampling:
  # Train-side only -- the test set is left at the real ~0.34% fraud rate
  # so evaluation reflects deployment conditions. With only ~3,963 fraud
  # rows in train, the ~5.1M non-fraud rows cost real compute (across
  # every model, and every future CV fold / tuning trial) for rapidly
  # diminishing information. Keep all fraud + a random sample of non-fraud
  # at this ratio instead of training on the full 5.1M rows.
  undersample_train: true
  negative_to_positive_ratio: 50

# Each block's keys are passed straight through as sklearn constructor
# kwargs (see train_pipeline.py) -- random_state is injected separately
# from the top-level key above so it stays consistent across all models.
models:
  logistic_regression:
    class_weight: balanced
    max_iter: 1000

  ridge:
    l1_ratio: 0
    C: 0.1
    class_weight: balanced
    max_iter: 1000

  lasso:
    # penalty was previously left unset (defaulting to l2, silently
    # ignoring l1_ratio) and solver was liblinear, which took ~18 minutes
    # to converge on 5.1M rows with an extreme class_weight ratio.
    # l1_ratio=1 + solver=saga actually applies L1 and is built for
    # datasets at this scale. (penalty=l1 works identically as of this
    # sklearn version but is deprecated, removed in 1.10 -- l1_ratio is
    # the forward-compatible way to say the same thing.)
    l1_ratio: 1
    solver: saga
    C: 0.1
    class_weight: balanced
    max_iter: 1000

  hist_gradient_boosting:
    # Replaces RandomForestClassifier: RF's exhaustive per-node split search
    # scales with row count, which is slow even after undersampling scales
    # it down. HistGradientBoostingClassifier bins each feature into ~255
    # buckets once up front, so split search cost is ~constant in row count
    # -- same algorithmic family as XGBoost/LightGBM (Sprint 1), and ships
    # with scikit-learn already.
    max_iter: 200
    max_depth: 8
    class_weight: balanced

  xgboost:
    # n_estimators is an upper bound -- early stopping (on the same
    # cost-sensitive eval set used for training) picks the real count, so
    # Optuna trials with a bad learning_rate/max_depth combo don't pay for
    # the full 1000 rounds. n_jobs kept low: this machine is dual-core/
    # 4-thread with no spare headroom (see hardware notes).
    n_estimators: 1000
    early_stopping_rounds: 20
    n_jobs: 2
    eval_metric: aucpr

  lightgbm:
    n_estimators: 1000
    early_stopping_rounds: 20
    n_jobs: 2

optuna:
  # Tuning is restricted to XGBoost/LightGBM (Sprint 1's new models) --
  # the existing baselines already have reasonable hand-set configs, and
  # sequential single-trial compute is the only safe option on this
  # machine, so trial count stays modest. Each trial's objective is mean
  # PR-AUC across ALL CV folds (not one designated fold) -- scoring
  # against a single fold risks landing on one that's trivially separable
  # and gives Optuna no real signal to discriminate between trials. Since
  # every trial now costs 3 fold-fits instead of 1, n_trials was cut from
  # 25 to 10 to keep full-run time reasonable on this dual-core machine
  # (~30min -> ~12-15min) -- 10 TPE trials over a 5-param space is still a
  # reasonable search, just less exhaustive.
  n_trials: 10
  direction: maximize

mlflow:
  # Local SQLite backend -- no server. MLflow 3.x put the plain filesystem
  # backend ("file:./mlruns") into maintenance mode and refuses to write to
  # it unless MLFLOW_ALLOW_FILE_STORE=true is set; sqlite is the currently
  # supported local-only option and also makes runs queryable via
  # mlflow.search_runs(), not just the UI.
  # `mlflow ui --backend-store-uri sqlite:///mlflow.db` to browse runs.
  tracking_uri: "sqlite:///mlflow.db"
  experiment_name: "fraud-detection"
